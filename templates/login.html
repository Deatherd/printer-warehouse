{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h4 class="text-center mb-0">Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Логин</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('register') }}">Зарегистрироваться</a>
                    <span class="mx-2">|</span>
                    <a href="{{ url_for('reset_password') }}" class="text-warning">Забыли пароль?</a>
                </div>
            </div>
        </div>

        <!-- Ссылка на GitHub -->
        <div class="text-center mt-3">
            <a href="https://github.com/Deatherd/printer-warehouse" class="text-muted text-decoration-none"
                target="_blank">
                <i class="bi bi-github"></i> PrintKeeper на GitHub
            </a>
        </div>
    </div>
</div>
{% endblock %}
