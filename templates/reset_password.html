{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="text-center mb-0">
                    <i class="bi bi-key"></i> Сброс пароля
                </h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i>
                    Для сброса пароля необходим специальный код регистрации.
                </div>

                <form method="POST" id="resetForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Логин пользователя</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required
                                placeholder="Введите логин">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="registration_code" class="form-label">Код регистрации</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                            <input type="password" class="form-control" id="registration_code" name="registration_code"
                                required placeholder="Введите специальный код">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">Новый пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="new_password" name="new_password" required
                                placeholder="Минимум 4 символа" minlength="4">
                            <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword('new_password')">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Подтвердите пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                required placeholder="Повторите пароль">
                            <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword('confirm_password')">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="progress" style="height: 5px;">
                            <div class="progress-bar" id="passwordStrength" role="progressbar" style="width: 0%;"></div>
                        </div>
                        <small id="passwordHelp" class="form-text text-muted"></small>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        <i class="bi bi-arrow-repeat"></i> Сбросить пароль
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{{ url_for('login') }}" class="text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Вернуться к входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.nextElementSibling.querySelector('i');

        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }

    // Проверка сложности пароля
    document.getElementById('new_password').addEventListener('input', function () {
        const password = this.value;
        const strengthBar = document.getElementById('passwordStrength');
        const helpText = document.getElementById('passwordHelp');

        let strength = 0;

        if (password.length >= 4) strength += 25;
        if (password.length >= 8) strength += 25;
        if (/[A-Z]/.test(password)) strength += 25;
        if (/[0-9!@#$%^&*]/.test(password)) strength += 25;

        strengthBar.style.width = strength + '%';

        if (strength <= 25) {
            strengthBar.className = 'progress-bar bg-danger';
            helpText.textContent = 'Слабый пароль';
        } else if (strength <= 50) {
            strengthBar.className = 'progress-bar bg-warning';
            helpText.textContent = 'Средний пароль';
        } else if (strength <= 75) {
            strengthBar.className = 'progress-bar bg-info';
            helpText.textContent = 'Хороший пароль';
        } else {
            strengthBar.className = 'progress-bar bg-success';
            helpText.textContent = 'Отличный пароль!';
        }
    });

    // Проверка совпадения паролей
    document.getElementById('confirm_password').addEventListener('input', function () {
        const password = document.getElementById('new_password').value;
        const confirm = this.value;

        if (password !== confirm) {
            this.classList.add('is-invalid');
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
        }
    });
</script>
{% endblock %}
