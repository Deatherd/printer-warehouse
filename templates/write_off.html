{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2><i class="bi bi-dash-circle"></i> Списание расходных материалов</h2>

        <div class="card mt-3">
            <div class="card-body">
                <form method="POST" id="writeOffForm">
                    <!-- Категория -->
                    <div class="mb-3">
                        <label for="category_filter" class="form-label">Категория</label>
                        <select class="form-select" id="category_filter">
                            <option value="all">Все категории</option>
                            {% set categories = [] %}
                            {% for item in items %}
                            {% if item.category_name not in categories %}
                            {% set _ = categories.append(item.category_name) %}
                            <option value="{{ item.category_name }}">{{ item.category_name }}</option>
                            {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="item_id" class="form-label">Позиция *</label>
                            <select class="form-select" id="item_id" name="item_id" required>
                                <option value="">Сначала выберите категорию</option>
                                {% for item in items %}
                                <option value="{{ item.id }}" data-category="{{ item.category_name }}"
                                    data-quantity="{{ item.quantity }}">
                                    {{ item.name }} (в наличии: {{ item.quantity }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-3 mb-3">
                            <label for="quantity" class="form-label">Количество *</label>
                            <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
                        </div>

                        <div class="col-md-3 mb-3">
                            <label for="point_id" class="form-label">Кому списали</label>
                            <select class="form-select" id="point_id" name="point_id"
                                onchange="toggleNewPoint(this.value)">
                                <option value="">Выберите...</option>
                                {% for point in points %}
                                <option value="{{ point.id }}">{{ point.name }}</option>
                                {% endfor %}
                                <option value="new">+ Новая точка</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3" id="new_point_div" style="display:none;">
                        <label for="new_point" class="form-label">Название новой точки списания</label>
                        <input type="text" class="form-control" id="new_point" name="new_point">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Причина списания</label>
                        <textarea class="form-control" id="description" name="description" rows="2"></textarea>
                    </div>

                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-dash-circle"></i> Списать
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    function toggleNewPoint(value) {
        var div = document.getElementById('new_point_div');
        var input = document.getElementById('new_point');

        if (value === 'new') {
            div.style.display = 'block';
            input.required = true;
        } else {
            div.style.display = 'none';
            input.required = false;
        }
    }

    // Фильтрация позиций по категории
    document.getElementById('category_filter').addEventListener('change', function () {
        var selectedCategory = this.value;
        var select = document.getElementById('item_id');
        var options = select.getElementsByTagName('option');

        // Очищаем текущий выбор
        select.value = '';

        // Показываем/скрываем опции
        var firstOption = true;
        for (var i = 0; i < options.length; i++) {
            var option = options[i];
            var category = option.getAttribute('data-category');

            if (option.value === '') {
                // Первая опция "Выберите..."
                if (selectedCategory === 'all') {
                    option.text = 'Выберите позицию...';
                } else {
                    option.text = 'Выберите позицию в категории ' + selectedCategory;
                }
                option.style.display = '';
            } else if (selectedCategory === 'all' || category === selectedCategory) {
                option.style.display = '';
            } else {
                option.style.display = 'none';
            }
        }
    });
</script>
{% endblock %}
